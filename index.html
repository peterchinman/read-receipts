<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>

		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />

		<meta name="description" content="A distance simulator." />
		<title>Read Receipts</title>

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>

		<!-- Theme: inline to apply before first paint (prevents flash of unstyled content) -->
		<script>
			(() => {
				const STORAGE_KEY = 'message-simulator:theme';
				const root = document.documentElement;
				const getSavedTheme = () => {
					try {
						return localStorage.getItem(STORAGE_KEY);
					} catch (_e) {
						return null;
					}
				};
				const applyTheme = (theme) => {
					if (theme === 'dark' || theme === 'light') {
						root.setAttribute('data-theme', theme);
						root.style.colorScheme = theme;
					} else {
						root.removeAttribute('data-theme');
						root.style.colorScheme = '';
					}
				};
				const mql =
					window.matchMedia &&
					window.matchMedia('(prefers-color-scheme: dark)');
				const syncToSystem = () => {
					const saved = getSavedTheme();
					if (saved === 'dark' || saved === 'light') return;
					applyTheme(mql && mql.matches ? 'dark' : 'light');
				};
				const saved = getSavedTheme();
				if (saved === 'dark' || saved === 'light') applyTheme(saved);
				else syncToSystem();
				if (mql) {
					const onChange = () => syncToSystem();
					if (typeof mql.addEventListener === 'function')
						mql.addEventListener('change', onChange);
					else if (typeof mql.addListener === 'function')
						mql.addListener(onChange);
				}
			})();
		</script>
		<link rel="stylesheet" href="/styles/styles.css" />
	</head>
	<body>
		<div id="root">
			<main id="app"></main>
		</div>

		<script type="module" src="/components/header-nav.js"></script>
		<script type="module" src="/components/landing-page.js"></script>
		<script type="module" src="/components/piece-reader.js"></script>
		<script type="module" src="/components/auth-verify.js"></script>
		<script type="module" src="/components/admin-login.js"></script>
		<script type="module" src="/components/admin-dashboard.js"></script>
		<script type="module" src="/components/create-list.js"></script>
		<script type="module" src="/components/multi-switch.js"></script>
		<script type="module" src="/components/theme-switch.js"></script>
		<script type="module" src="/components/create-editor.js"></script>
		<script type="module" src="/components/create-preview.js"></script>
		<script type="module" src="/app.js"></script>
	</body>
</html>
