# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name readreceipts.org www.readreceipts.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name readreceipts.org www.readreceipts.org;

    ssl_certificate /etc/letsencrypt/live/readreceipts.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/readreceipts.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/readreceipts;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Block direct access to sensitive paths
    location ~ /\.env       { deny all; return 404; }
    location ~ /\.git       { deny all; return 404; }
    location ^~ /backend    { deny all; return 404; }
    location ^~ /node_modules { deny all; return 404; }
    location ^~ /scripts    { deny all; return 404; }

    # API requests → Laravel via PHP-FPM
    # All /api/* routes are handled by backend/public/index.php
    location /api {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/readreceipts/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/readreceipts/backend/public;
        include fastcgi_params;
    }

    # Frontend — SPA fallback so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
